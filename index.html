<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shelter Network Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --orange: #f97316;
    --orange-light: #fff7ed;
    --orange-border: #fed7aa;
    --orange-dark: #c2410c;
    --bg: #f9fafb;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.08);
    --text: #111827;
    --muted: #6b7280;
    --subtle: #f3f4f6;
    --green: #16a34a;
    --green-bg: #f0fdf4;
    --green-border: #bbf7d0;
    --yellow: #b45309;
    --yellow-bg: #fffbeb;
    --yellow-border: #fde68a;
    --red: #dc2626;
    --red-bg: #fef2f2;
    --red-border: #fecaca;
    --radius: 10px;
    --radius-sm: 6px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: rgba(255,255,255,0.08);
      --text: #f3f4f6;
      --muted: #9ca3af;
      --subtle: #1f2230;
      --orange-light: #1c1008;
      --orange-border: #7c2d12;
      --green-bg: #052e16;
      --green-border: #14532d;
      --yellow-bg: #1c1008;
      --yellow-border: #78350f;
      --red-bg: #1f0707;
      --red-border: #7f1d1d;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 600;
    font-size: 16px;
    color: var(--text);
    text-decoration: none;
  }

  .logo-mark {
    width: 28px;
    height: 28px;
    background: var(--orange);
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .logo-mark svg { width: 16px; height: 16px; fill: white; }

  .header-right { display: flex; align-items: center; gap: 12px; }
  #last-updated { font-size: 12px; color: var(--muted); }

  .refresh-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 5px 12px;
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .refresh-btn:hover { background: var(--subtle); color: var(--text); }

  .alerts-bar {
    padding: 8px 2rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .alerts-bar.hidden { display: none; }

  .alert-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    border: 1px solid;
  }
  .alert-pill.red { background: var(--red-bg); color: var(--red); border-color: var(--red-border); }
  .alert-pill.yellow { background: var(--yellow-bg); color: var(--yellow); border-color: var(--yellow-border); }
  .alert-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .alert-pill.red .alert-dot { background: var(--red); }
  .alert-pill.yellow .alert-dot { background: var(--yellow); }

  main { max-width: 1200px; margin: 0 auto; padding: 2rem; }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .ai-insight {
    background: var(--surface);
    border: 1px solid var(--orange-border);
    border-radius: var(--radius);
    padding: 1.25rem 1.5rem;
    margin-bottom: 1.5rem;
    display: flex;
    gap: 14px;
    align-items: flex-start;
  }

  .ai-insight.hidden { display: none; }

  .ai-icon {
    width: 32px;
    height: 32px;
    background: var(--orange);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .ai-icon svg { width: 16px; height: 16px; fill: white; }

  .ai-body { flex: 1; }

  .ai-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--orange-dark);
    margin-bottom: 4px;
  }

  .ai-text {
    font-size: 14px;
    color: var(--text);
    line-height: 1.7;
  }

  .ai-time {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
  }

  .charts-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
    margin-bottom: 2rem;
  }

  @media (max-width: 1000px) { .charts-grid { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 640px) { .charts-grid { grid-template-columns: 1fr; } }

  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
  }

  .chart-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    margin-bottom: 1rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-size: 11px;
  }

  .chart-wrap { position: relative; }

  .metrics-row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    margin-bottom: 2rem;
  }

  @media (max-width: 800px) { .metrics-row { grid-template-columns: repeat(3, 1fr); } }

  .metric-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.875rem 1rem;
  }

  .metric-label { font-size: 11px; color: var(--muted); margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.04em; }
  .metric-value { font-size: 22px; font-weight: 600; color: var(--text); line-height: 1.2; }
  .metric-value.orange { color: var(--orange); }

  .featured-section { margin-bottom: 2rem; }

  .featured-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }

  .featured-card {
    background: var(--surface);
    border: 1px solid var(--orange-border);
    border-radius: var(--radius);
    padding: 1.25rem;
    position: relative;
    overflow: hidden;
  }

  .featured-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--orange);
  }

  .featured-badge {
    display: inline-flex;
    align-items: center;
    background: var(--orange-light);
    color: var(--orange-dark);
    border: 1px solid var(--orange-border);
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .featured-name { font-size: 18px; font-weight: 600; margin-bottom: 2px; }

  .featured-meta {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }

  .featured-desc { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 10px; }

  .featured-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }

  .days-tag {
    background: var(--green-bg);
    color: var(--green);
    border: 1px solid var(--green-border);
    border-radius: 20px;
    padding: 2px 8px;
    font-size: 11px;
    font-weight: 500;
  }
  .days-tag.warn { background: var(--yellow-bg); color: var(--yellow); border-color: var(--yellow-border); }
  .days-tag.urgent { background: var(--red-bg); color: var(--red); border-color: var(--red-border); }

  .two-col {
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 1.5rem;
    margin-bottom: 2rem;
  }
  @media (max-width: 900px) { .two-col { grid-template-columns: 1fr; } }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .panel-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    font-weight: 500;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .shelter-list { padding: 8px 0; }

  .shelter-item {
    padding: 10px 16px;
    cursor: pointer;
    transition: background 0.1s;
    border-left: 3px solid transparent;
  }
  .shelter-item:hover { background: var(--subtle); }
  .shelter-item.active { background: var(--orange-light); border-left-color: var(--orange); }

  .shelter-name { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
  .shelter-meta { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 8px; }

  .bar-wrap { flex: 1; height: 4px; background: var(--subtle); border-radius: 2px; overflow: hidden; }
  .bar-fill { height: 100%; background: var(--orange); border-radius: 2px; transition: width 0.4s ease; }
  .bar-fill.critical { background: var(--red); }

  .animals-panel { display: flex; flex-direction: column; }

  .animals-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }

  .animals-title { font-weight: 500; font-size: 14px; }
  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; }

  .filter-btn {
    background: var(--subtle);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 12px;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.15s;
  }
  .filter-btn.active { background: var(--orange); border-color: var(--orange); color: white; }

  .animals-grid {
    padding: 12px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 10px;
  }

  .animal-card {
    background: var(--subtle);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px;
    transition: border-color 0.15s;
  }
  .animal-card:hover { border-color: var(--orange-border); }

  .animal-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 6px; }
  .animal-name { font-size: 14px; font-weight: 600; }
  .animal-breed { font-size: 12px; color: var(--muted); margin-bottom: 6px; }

  .badge { font-size: 11px; padding: 2px 7px; border-radius: 20px; font-weight: 500; flex-shrink: 0; }
  .badge-available { background: var(--green-bg); color: var(--green); }
  .badge-pending { background: var(--yellow-bg); color: var(--yellow); }
  .badge-adopted { background: var(--subtle); color: var(--muted); }
  .badge-dog { background: var(--orange-light); color: var(--orange-dark); }
  .badge-cat { background: #f0f4ff; color: #3730a3; }

  @media (prefers-color-scheme: dark) {
    .badge-cat { background: #1e1b4b; color: #a5b4fc; }
  }

  .animal-desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .animal-footer {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    font-size: 11px;
    color: var(--muted);
    align-items: center;
    justify-content: space-between;
  }

  .timeline-section { margin-bottom: 2rem; }

  .timeline-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
  }
  @media (max-width: 900px) { .timeline-grid { grid-template-columns: 1fr; } }

  .event-list { padding: 0; }

  .event-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .event-item:last-child { border-bottom: none; }

  .event-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
  .dot-adopted { background: var(--green); }
  .dot-intake { background: var(--orange); }
  .dot-status_change { background: var(--muted); }

  .event-text { flex: 1; color: var(--text); }
  .event-time { color: var(--muted); font-size: 12px; white-space: nowrap; }

  .shelter-activity { padding: 12px 16px; }

  .activity-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .activity-row:last-child { border-bottom: none; }

  .activity-name { font-weight: 500; margin-bottom: 2px; }
  .activity-stats { font-size: 12px; color: var(--muted); }
  .activity-badges { display: flex; gap: 6px; }

  .mini-badge { font-size: 11px; padding: 2px 7px; border-radius: 20px; font-weight: 500; }
  .mini-adopted { background: var(--green-bg); color: var(--green); }
  .mini-intake { background: var(--orange-light); color: var(--orange-dark); }

  .empty-state { padding: 3rem; text-align: center; color: var(--muted); font-size: 14px; }
  .loading { padding: 2rem; text-align: center; color: var(--muted); font-size: 13px; }
  .spinning { display: inline-block; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <a class="logo" href="#">
    <div class="logo-mark">
      <svg viewBox="0 0 16 16"><path d="M8 1a4 4 0 100 8A4 4 0 008 1zM3 12c0-1.5 2.2-2.5 5-2.5s5 1 5 2.5v1H3v-1z"/></svg>
    </div>
    Shelter Network
  </a>
  <div class="header-right">
    <span id="last-updated"></span>
    <button class="refresh-btn" onclick="loadAll()">Refresh</button>
  </div>
</header>

<div class="alerts-bar hidden" id="alerts-bar"></div>

<main>

  <div class="ai-insight hidden" id="ai-insight">
    <div class="ai-icon">
      <svg viewBox="0 0 16 16"><path d="M8 1a3 3 0 00-3 3c0 1.1.6 2.1 1.5 2.6C4.7 7.1 3 8.9 3 11h10c0-2.1-1.7-3.9-3.5-4.4A3 3 0 0011 4a3 3 0 00-3-3z"/></svg>
    </div>
    <div class="ai-body">
      <div class="ai-label">Daily insight — generated by CyberClaw</div>
      <div class="ai-text" id="ai-text"></div>
      <div class="ai-time" id="ai-time"></div>
    </div>
  </div>

  <div class="section-label">Network overview</div>

  <div class="charts-grid">
    <div class="chart-card">
      <div class="chart-title">Intake vs adoptions — last 30 days</div>
      <div class="chart-wrap"><canvas id="trends-chart" height="180"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Species breakdown</div>
      <div class="chart-wrap"><canvas id="species-chart" height="180"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Adoption rate by shelter</div>
      <div class="chart-wrap"><canvas id="shelter-chart" height="180"></canvas></div>
    </div>
  </div>

  <div class="metrics-row" id="metrics-row">
    <div class="loading"><span class="spinning">↻</span></div>
  </div>

  <div class="featured-section">
    <div class="section-label">Newest arrivals</div>
    <div class="featured-grid" id="featured-grid">
      <div class="loading"><span class="spinning">↻</span></div>
    </div>
  </div>

  <div class="two-col">
    <div class="panel">
      <div class="panel-header">
        <span>Shelters</span>
        <span id="shelter-count" style="font-size:12px;color:var(--muted)"></span>
      </div>
      <div class="shelter-list" id="shelter-list">
        <div class="loading"><span class="spinning">↻</span></div>
      </div>
    </div>

    <div class="panel animals-panel">
      <div class="animals-header">
        <span class="animals-title" id="animals-title">All animals</span>
        <div class="filter-row">
          <button class="filter-btn active" onclick="setFilter('available', this)">Available</button>
          <button class="filter-btn" onclick="setFilter('pending', this)">Pending</button>
          <button class="filter-btn" onclick="setFilter('adopted', this)">Adopted</button>
          <button class="filter-btn" onclick="setFilter('all', this)">All</button>
        </div>
      </div>
      <div class="animals-grid" id="animals-grid">
        <div class="loading"><span class="spinning">↻</span></div>
      </div>
    </div>
  </div>

  <div class="timeline-section">
    <div class="section-label">Activity timeline</div>
    <div class="timeline-grid">
      <div class="panel">
        <div class="panel-header">Recent events</div>
        <div class="event-list" id="event-list">
          <div class="loading"><span class="spinning">↻</span></div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-header">Shelter activity breakdown</div>
        <div class="shelter-activity" id="shelter-activity">
          <div class="loading"><span class="spinning">↻</span></div>
        </div>
      </div>
    </div>
  </div>

</main>

<script>
const API = 'https://shelter-api.cybergrind.org';
let allAnimals = [], allShelters = [], allEvents = [];
let activeShelter = null, activeFilter = 'available';
let trendsChart, speciesChart, shelterChart;

const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
const gridColor = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)';
const tickColor = isDark ? '#9ca3af' : '#6b7280';

Chart.defaults.font.family = "-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
Chart.defaults.font.size = 11;

async function fetchJSON(path) {
  const r = await fetch(API + path);
  if (!r.ok) throw new Error(r.status);
  return r.json();
}

function daysInShelter(iso) {
  return Math.floor((Date.now() - new Date(iso + (iso.endsWith('Z') ? '' : 'Z'))) / 86400000);
}

function timeAgo(iso) {
  const diff = Math.floor((Date.now() - new Date(iso + (iso.endsWith('Z') ? '' : 'Z'))) / 1000);
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  return Math.floor(diff/86400) + 'd ago';
}

function daysBadge(days) {
  if (days >= 30) return `<span class="days-tag urgent">${days} days — needs home</span>`;
  if (days >= 14) return `<span class="days-tag warn">${days} days here</span>`;
  return `<span class="days-tag">${days} days here</span>`;
}

function renderAI(summary) {
  const block = document.getElementById('ai-insight');
  if (!summary || !summary.summary) return;
  block.classList.remove('hidden');
  document.getElementById('ai-text').textContent = summary.summary;
  const d = new Date(summary.generated_at + 'Z');
  document.getElementById('ai-time').textContent = 'Generated ' + d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function renderAlerts(animals, metrics) {
  const bar = document.getElementById('alerts-bar');
  const alerts = [];
  if (metrics && metrics.capacity_utilization) {
    metrics.capacity_utilization.forEach(u => {
      if (u.utilization >= 80) alerts.push({ type: 'red', text: `${u.shelter} is at ${Math.round(u.utilization)}% capacity` });
    });
  }
  const longStay = animals.filter(a => a.status === 'available' && daysInShelter(a.intake_date) >= 30);
  if (longStay.length > 0) alerts.push({ type: 'yellow', text: `${longStay.length} animal${longStay.length > 1 ? 's have' : ' has'} been here 30+ days` });
  if (!alerts.length) { bar.classList.add('hidden'); return; }
  bar.classList.remove('hidden');
  bar.innerHTML = alerts.map(a => `<div class="alert-pill ${a.type}"><div class="alert-dot"></div>${a.text}</div>`).join('');
}

function renderMetrics(m) {
  document.getElementById('metrics-row').innerHTML = `
    <div class="metric-card"><div class="metric-label">Total</div><div class="metric-value">${m.total_animals}</div></div>
    <div class="metric-card"><div class="metric-label">Available</div><div class="metric-value orange">${m.available}</div></div>
    <div class="metric-card"><div class="metric-label">Adopted</div><div class="metric-value">${m.adopted}</div></div>
    <div class="metric-card"><div class="metric-label">Adoption rate</div><div class="metric-value">${m.adoption_rate.toFixed(1)}<span style="font-size:14px;font-weight:400">%</span></div></div>
    <div class="metric-card"><div class="metric-label">Pending</div><div class="metric-value">${m.pending}</div></div>
  `;
}

function renderTrendsChart(trends) {
  const allDates = new Set([
    ...trends.intakes.map(d => d.date),
    ...trends.adoptions.map(d => d.date)
  ]);
  const dates = Array.from(allDates).sort();
  const intakeMap = Object.fromEntries(trends.intakes.map(d => [d.date, d.count]));
  const adoptMap = Object.fromEntries(trends.adoptions.map(d => [d.date, d.count]));

  const labels = dates.map(d => {
    const dt = new Date(d);
    return (dt.getMonth()+1) + '/' + dt.getDate();
  });

  if (trendsChart) trendsChart.destroy();
  trendsChart = new Chart(document.getElementById('trends-chart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        {
          label: 'Intakes',
          data: dates.map(d => intakeMap[d] || 0),
          backgroundColor: '#f97316',
          borderRadius: 3,
        },
        {
          label: 'Adoptions',
          data: dates.map(d => adoptMap[d] || 0),
          backgroundColor: '#16a34a',
          borderRadius: 3,
        }
      ]
    },
    options: {
      responsive: true,
      plugins: { legend: { labels: { color: tickColor, boxWidth: 10, padding: 12 } } },
      scales: {
        x: { ticks: { color: tickColor, maxTicksLimit: 8 }, grid: { color: gridColor } },
        y: { ticks: { color: tickColor, stepSize: 1 }, grid: { color: gridColor }, beginAtZero: true }
      }
    }
  });
}

function renderSpeciesChart(species) {
  const dogs = (species.dog?.available || 0) + (species.dog?.adopted || 0) + (species.dog?.pending || 0);
  const cats = (species.cat?.available || 0) + (species.cat?.adopted || 0) + (species.cat?.pending || 0);

  if (speciesChart) speciesChart.destroy();
  speciesChart = new Chart(document.getElementById('species-chart'), {
    type: 'doughnut',
    data: {
      labels: ['Dogs', 'Cats'],
      datasets: [{
        data: [dogs, cats],
        backgroundColor: ['#f97316', '#6366f1'],
        borderWidth: 0,
        hoverOffset: 4
      }]
    },
    options: {
      responsive: true,
      cutout: '65%',
      plugins: {
        legend: { position: 'bottom', labels: { color: tickColor, boxWidth: 10, padding: 12 } }
      }
    }
  });
}

function renderShelterChart(byShelter) {
  const sorted = [...byShelter].sort((a, b) => b.adoption_rate - a.adoption_rate);
  const labels = sorted.map(s => s.shelter.replace(' Animal', '').replace(' Pet', '').replace(' Humane', ''));
  const rates = sorted.map(s => s.adoption_rate);

  if (shelterChart) shelterChart.destroy();
  shelterChart = new Chart(document.getElementById('shelter-chart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: 'Adoption rate %',
        data: rates,
        backgroundColor: '#f97316',
        borderRadius: 3,
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        x: {
          ticks: { color: tickColor, callback: v => v + '%' },
          grid: { color: gridColor },
          beginAtZero: true,
          max: 100
        },
        y: { ticks: { color: tickColor } , grid: { color: gridColor } }
      }
    }
  });
}

function renderFeatured(animals) {
  const newest = animals
    .filter(a => a.status === 'available')
    .sort((a, b) => new Date(b.intake_date) - new Date(a.intake_date))
    .slice(0, 3);

  if (!newest.length) {
    document.getElementById('featured-grid').innerHTML = '<div class="empty-state">No available animals</div>';
    return;
  }

  document.getElementById('featured-grid').innerHTML = newest.map(a => {
    const days = daysInShelter(a.intake_date);
    const shelterName = allShelters.find(s => s.id === a.shelter_id)?.name || '';
    return `
      <div class="featured-card">
        <div class="featured-badge">New arrival</div>
        <div class="featured-name">${a.name}</div>
        <div class="featured-meta">
          <span class="badge badge-${a.species}">${a.species}</span>
          <span>${a.breed}</span>
          <span>&middot;</span>
          <span>${a.age_years}yr</span>
          <span>&middot;</span>
          <span>${a.sex}</span>
        </div>
        <div class="featured-desc">${a.description || ''}</div>
        <div class="featured-footer">
          <span style="font-size:12px;color:var(--muted)">${shelterName}</span>
          ${daysBadge(days)}
        </div>
      </div>`;
  }).join('');
}

function renderShelters(shelters, metrics) {
  document.getElementById('shelter-count').textContent = shelters.length + ' locations';
  const utilMap = {};
  if (metrics?.capacity_utilization) metrics.capacity_utilization.forEach(u => { utilMap[u.shelter] = u; });

  document.getElementById('shelter-list').innerHTML = shelters.map(s => {
    const u = utilMap[s.name] || { current: s.current_count, capacity: s.capacity, utilization: 0 };
    const pct = Math.round(u.utilization);
    const critical = pct >= 80;
    return `
      <div class="shelter-item ${activeShelter === s.id ? 'active' : ''}" onclick="selectShelter('${s.id}', '${s.name}', event)">
        <div class="shelter-name">${s.name}</div>
        <div class="shelter-meta">
          <span>${s.city}, ${s.state}</span>
          <div class="bar-wrap"><div class="bar-fill ${critical ? 'critical' : ''}" style="width:${pct}%"></div></div>
          <span style="white-space:nowrap;${critical ? 'color:var(--red)' : ''}">${u.current}/${u.capacity}</span>
        </div>
      </div>`;
  }).join('');
}

function renderAnimals(animals) {
  const grid = document.getElementById('animals-grid');
  if (!animals.length) { grid.innerHTML = '<div class="empty-state">No animals found</div>'; return; }
  grid.innerHTML = animals.map(a => {
    const days = daysInShelter(a.intake_date);
    return `
      <div class="animal-card">
        <div class="animal-top">
          <div class="animal-name">${a.name}</div>
          <span class="badge badge-${a.status}">${a.status}</span>
        </div>
        <div class="animal-breed">
          <span class="badge badge-${a.species}" style="margin-right:4px">${a.species}</span>
          ${a.breed} &middot; ${a.age_years}yr &middot; ${a.sex}
        </div>
        <div class="animal-desc">${a.description || ''}</div>
        <div class="animal-footer">
          <span>${a.health_status}</span>
          ${daysBadge(days)}
        </div>
      </div>`;
  }).join('');
}

function renderEvents(events) {
  const list = document.getElementById('event-list');
  if (!events.length) { list.innerHTML = '<div class="empty-state">No recent activity</div>'; return; }
  list.innerHTML = events.slice(0, 15).map(e => `
    <div class="event-item">
      <div class="event-dot dot-${e.event_type}"></div>
      <div class="event-text">${e.notes || e.event_type}</div>
      <div class="event-time">${timeAgo(e.timestamp)}</div>
    </div>
  `).join('');
}

function renderShelterActivity(shelters, events) {
  const container = document.getElementById('shelter-activity');
  if (!shelters.length) { container.innerHTML = '<div class="empty-state">No data</div>'; return; }
  const activity = shelters.map(s => {
    const se = events.filter(e => e.shelter_id === s.id);
    const adopted = se.filter(e => e.event_type === 'adopted').length;
    const intakes = se.filter(e => e.event_type === 'intake').length;
    const longStay = allAnimals.filter(a => a.shelter_id === s.id && a.status === 'available' && daysInShelter(a.intake_date) >= 30).length;
    return { ...s, adopted, intakes, longStay };
  });
  container.innerHTML = activity.map(s => `
    <div class="activity-row">
      <div>
        <div class="activity-name">${s.name}</div>
        <div class="activity-stats">${s.city}, ${s.state}${s.longStay > 0 ? ` &middot; <span style="color:var(--yellow)">${s.longStay} long-stay</span>` : ''}</div>
      </div>
      <div class="activity-badges">
        ${s.intakes > 0 ? `<span class="mini-badge mini-intake">+${s.intakes} in</span>` : ''}
        ${s.adopted > 0 ? `<span class="mini-badge mini-adopted">${s.adopted} adopted</span>` : ''}
      </div>
    </div>
  `).join('');
}

function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilter();
}

function selectShelter(id, name, e) {
  activeShelter = activeShelter === id ? null : id;
  document.querySelectorAll('.shelter-item').forEach(el => el.classList.remove('active'));
  if (activeShelter) e.currentTarget.classList.add('active');
  document.getElementById('animals-title').textContent = activeShelter ? name : 'All animals';
  applyFilter();
}

function applyFilter() {
  let filtered = allAnimals;
  if (activeShelter) filtered = filtered.filter(a => a.shelter_id === activeShelter);
  if (activeFilter !== 'all') filtered = filtered.filter(a => a.status === activeFilter);
  renderAnimals(filtered);
}

async function loadAll() {
  try {
    const [metrics, shelters, animals, events, trends, species, byShelter, summary] = await Promise.all([
      fetchJSON('/metrics'),
      fetchJSON('/shelters'),
      fetchJSON('/animals'),
      fetchJSON('/events'),
      fetchJSON('/metrics/trends'),
      fetchJSON('/metrics/species'),
      fetchJSON('/metrics/by-shelter'),
      fetchJSON('/metrics/summary'),
    ]);
    allAnimals = animals;
    allShelters = shelters;
    allEvents = events;
    renderAI(summary);
    renderAlerts(animals, metrics);
    renderMetrics(metrics);
    renderTrendsChart(trends);
    renderSpeciesChart(species);
    renderShelterChart(byShelter);
    renderFeatured(animals);
    renderShelters(shelters, metrics);
    applyFilter();
    renderEvents(events);
    renderShelterActivity(shelters, events);
    document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString();
  } catch (e) {
    console.error(e);
  }
}

loadAll();
setInterval(loadAll, 60000);
</script>
</body>
</html>
